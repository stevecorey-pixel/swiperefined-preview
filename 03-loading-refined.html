<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SwipeRefined — Reading your first impression…</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="kit.css" />
<style>
/* ---- Loading screen layout ---- */
.loading-wrap{min-height:calc(100vh - 72px);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:60px 20px}

/* Atmosphere blobs */
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;pointer-events:none;z-index:0}
.blob-coral{width:520px;height:520px;background:radial-gradient(circle,rgba(242,107,91,.5),transparent 70%);top:-180px;right:-140px}
.blob-teal{width:420px;height:420px;background:radial-gradient(circle,rgba(31,111,104,.32),transparent 70%);bottom:-160px;left:-120px}

.loading-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;gap:40px;max-width:520px;width:100%}

/* Header */
.loading-head h1{font-size:clamp(24px,3.5vw,34px);font-weight:800;line-height:1.1;margin-bottom:12px}
.loading-head p{font-size:16px;color:var(--gray);max-width:420px;margin:0 auto;line-height:1.6}

/* Large progress ring */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring.ring-lg{width:150px;height:150px}
.ring.ring-lg svg{transform:rotate(-90deg)}
.ring.ring-lg .val{font-size:32px;font-weight:800;font-family:'Manrope',sans-serif}

/* Checklist card */
.checklist{width:100%;max-width:460px}
.check-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.check-row:last-child{border-bottom:none}
.check-icon{width:24px;height:24px;flex-shrink:0;display:grid;place-items:center}

/* done: green check */
.icon-done{color:var(--green)}
.icon-done svg{width:20px;height:20px}

/* in-progress: coral spinner */
.icon-progress{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(242,107,91,.25);border-top-color:var(--coral);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){
  .icon-progress{animation:none;border-top-color:var(--coral)}
}

/* pending: hollow circle */
.icon-pending{width:18px;height:18px;border:2px solid var(--border);border-radius:50%;opacity:.5}

.check-label{font-size:15px;font-weight:500;color:var(--charcoal)}
.check-label.muted{color:var(--gray)}

/* Reveal */
.reveal{opacity:0;transform:translateY(18px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.reveal.in{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){
  .reveal{opacity:1;transform:none;transition:none}
  html{scroll-behavior:auto}
}

/* Footer — minimal for loading screen */
.sr-foot{background:var(--sand);padding:32px 0 24px}
.foot-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.foot-links{display:flex;gap:22px;flex-wrap:wrap}
.foot-links a{color:var(--gray);font-size:13px;transition:color .2s}
.foot-links a:hover{color:var(--coral)}
.foot-note{color:var(--gray);font-size:12px;margin-top:16px;text-align:center}
</style>
</head>
<body>

<nav class="sr-nav">
  <div class="wrap nav-inner">
    <a class="logo" href="#">
      <span class="mark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="3" stroke="#fff" stroke-width="2"/><path d="M9 16l1.5-3.5L14 11l-3.5-1.5L9 6l-1.5 3.5L4 11l3.5 1.5L9 16z" fill="#fff"/></svg></span>
      <span><span class="swipe">Swipe</span><span class="refined">Refined</span></span>
    </a>
    <div class="nav-links">
      <a href="#" class="signin">Sign in</a>
    </div>
  </div>
</nav>

<main class="loading-wrap">
  <div class="blob blob-coral"></div>
  <div class="blob blob-teal"></div>

  <div class="loading-inner">

    <!-- Header -->
    <div class="loading-head reveal">
      <h1>Reading your first impression…</h1>
      <p>We're looking at photo order, bio clarity, prompt specificity, tone, and profile consistency.</p>
    </div>

    <!-- Large ring: coral, data-val=68 -->
    <div class="ring-wrap reveal">
      <div class="ring ring-lg" data-val="68" data-col="#F26B5B">
        <svg width="150" height="150" viewBox="0 0 150 150">
          <circle class="ring-track" cx="75" cy="75" r="62" fill="none" stroke="#EFE5DA" stroke-width="10"/>
          <circle class="ring-fg" cx="75" cy="75" r="62" fill="none" stroke="#F26B5B" stroke-width="10" stroke-linecap="round" stroke-dasharray="389.6" stroke-dashoffset="389.6"/>
        </svg>
        <span class="val">0</span>
      </div>
    </div>

    <!-- Checklist -->
    <div class="card checklist reveal">
      <!-- Done -->
      <div class="check-row">
        <span class="check-icon icon-done">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        </span>
        <span class="check-label">Reviewing photo lineup</span>
      </div>
      <!-- Done -->
      <div class="check-row">
        <span class="check-icon icon-done">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        </span>
        <span class="check-label">Scoring profile clarity</span>
      </div>
      <!-- In progress -->
      <div class="check-row">
        <span class="check-icon"><span class="icon-progress" aria-label="In progress"></span></span>
        <span class="check-label">Checking prompt strength</span>
      </div>
      <!-- Pending -->
      <div class="check-row">
        <span class="check-icon"><span class="icon-pending" aria-hidden="true"></span></span>
        <span class="check-label muted">Finding easy wins</span>
      </div>
      <!-- Pending -->
      <div class="check-row">
        <span class="check-icon"><span class="icon-pending" aria-hidden="true"></span></span>
        <span class="check-label muted">Building action plan</span>
      </div>
    </div>

  </div>
</main>

<script src="kit.js" defer></script>
</body>
</html>
